name = "watercooler"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Per-IP rate limiting for API calls (WS / mem / sync).
[[unsafe.bindings]]
name = "API_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 120, period = 60 }

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "SessionRoom"

# SQLite-backed Durable Objects (required on the free Workers plan).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionRoom"]
